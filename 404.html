<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.07) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridShift 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridShift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 48px 48px;
            }
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 56px 64px;
            background: #111118;
            border: 1px solid rgba(99, 102, 241, 0.25);
            max-width: 600px;
            width: 90%;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
        }

        /* Corner accent lines */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #6366f1;
            border-style: solid;
        }

        .container::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .container::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .label {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #6366f1;
            margin-bottom: 24px;
            padding: 6px 14px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(99, 102, 241, 0.08);
        }

        h1 {
            font-size: 130px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -4px;
            text-shadow: 0 0 80px rgba(99, 102, 241, 0.5);
        }

        h1 span {
            color: #6366f1;
        }

        h2 {
            font-size: 22px;
            color: #a0a0b8;
            margin-bottom: 16px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        p {
            font-size: 15px;
            color: #55556a;
            margin-bottom: 40px;
            line-height: 1.7;
        }

        a {
            display: inline-block;
            padding: 13px 36px;
            background: transparent;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid rgba(99, 102, 241, 0.6);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.25s ease;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
        }

        a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        a:hover {
            border-color: #6366f1;
            color: #ffffff;
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.3), inset 0 0 24px rgba(99, 102, 241, 0.05);
        }

        a:hover::before {
            opacity: 1;
        }

        a:active {
            transform: scale(0.98);
        }

        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            margin: 0 auto 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="label">Error</div>
        <h1><span>4</span>0<span>4</span></h1>
        <div class="divider"></div>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist<br>or has been moved to another location.</p>
        <a href="index.html">← Return to Home</a>
    </div>
</body>

</html>
